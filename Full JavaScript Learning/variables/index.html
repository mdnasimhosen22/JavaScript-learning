<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* background: #0f0f0f; */
        font-family: "Georgia", serif;
        overflow: hidden;
      }

      .text-wrapper {
        display: flex;
        gap: 5px;
      }

      .letter {
        font-size: 80px;
        font-weight: bold;
        color: #ffffff;
        opacity: 0;
        transform: translateX(-300px);
        display: inline-block;
        animation: slideIn 0.5s forwards;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
      }

      /* Space between Hello and World */
      .space {
        width: 30px;
      }

      /* প্রতিটি letter এর জন্য আলাদা delay */
      .letter:nth-child(1) {
        /* animation-delay: 0s; */

        animation-delay: 1.35s;
      }
      .letter:nth-child(2) {
        /* animation-delay: 0.15s; */
        animation-delay: 1.2s;
      }
      .letter:nth-child(3) {
        /* animation-delay: 0.3s; */

        animation-delay: 1.05s;
      }
      .letter:nth-child(4) {
        /* animation-delay: 0.45s; */

        animation-delay: 0.9s;
      }
      .letter:nth-child(5) {
        /* animation-delay: 0.6s; */

        animation-delay: 0.75s;
      }
      /* space */
      .letter:nth-child(7) {
        /* animation-delay: 0.75s; */

        animation-delay: 0.6s;
      }
      .letter:nth-child(8) {
        /* animation-delay: 0.9s; */

        animation-delay: 0.45s;
      }
      .letter:nth-child(9) {
        /* animation-delay: 1.05s; */
        animation-delay: 0.3s;
      }
      .letter:nth-child(10) {
        /* animation-delay: 1.2s; */

        animation-delay: 0.15s;
      }
      .letter:nth-child(11) {
        /* animation-delay: 1.35s; */

        animation-delay: 0.3s;
      }

      @keyframes slideIn {
        0% {
          opacity: 0;
          transform: translateX(-400px);
        }
        70% {
          opacity: 1;
          transform: translateX(10px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* শেষ letter আসার পর পুরো text আবার reset হয়ে loop করে */
      .text-wrapper {
        animation: resetAll 4.5s infinite;
      }

      @keyframes resetAll {
        0% {
          opacity: 1;
        }
        85% {
          opacity: 1;
        }
        95% {
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body style="background-color: #111043">
    <div class="text-wrapper">
      <span class="letter">H</span>
      <span class="letter">i</span>
      <span class="space"></span>
      <span class="letter">I</span>
      <span class="letter">a</span>
      <span class="letter">m</span>
      <span class="space"></span>
      <span class="letter">N</span>
      <span class="letter">a</span>
      <span class="letter">s</span>
      <span class="letter">i</span>
      <span class="letter">m</span>
    </div>

    <script src="./prototypeInheritance.js"></script>
  </body>
</html>
