<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Calculator</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl w-80">
      <!-- Display -->
      <input
        id="display"
        type="text"
        class="w-full mb-4 p-3 text-right text-2xl rounded-lg bg-gray-700 text-white outline-none"
        disabled
      />

      <!-- Buttons -->
      <div class="grid grid-cols-4 gap-3">
        <button onclick="clearDisplay()" class="bg-red-500 p-3 rounded-lg">
          C
        </button>
        <button onclick="appendValue('/')" class="bg-gray-600 p-3 rounded-lg">
          /
        </button>
        <button onclick="appendValue('*')" class="bg-gray-600 p-3 rounded-lg">
          *
        </button>
        <button onclick="appendValue('-')" class="bg-gray-600 p-3 rounded-lg">
          -
        </button>

        <button onclick="appendValue('7')" class="bg-gray-700 p-3 rounded-lg">
          7
        </button>
        <button onclick="appendValue('8')" class="bg-gray-700 p-3 rounded-lg">
          8
        </button>
        <button onclick="appendValue('9')" class="bg-gray-700 p-3 rounded-lg">
          9
        </button>
        <button onclick="appendValue('+')" class="bg-gray-600 p-3 rounded-lg">
          +
        </button>

        <button onclick="appendValue('4')" class="bg-gray-700 p-3 rounded-lg">
          4
        </button>
        <button onclick="appendValue('5')" class="bg-gray-700 p-3 rounded-lg">
          5
        </button>
        <button onclick="appendValue('6')" class="bg-gray-700 p-3 rounded-lg">
          6
        </button>
        <button
          onclick="calculate()"
          class="bg-green-500 row-span-2 p-3 rounded-lg"
        >
          =
        </button>

        <button onclick="appendValue('1')" class="bg-gray-700 p-3 rounded-lg">
          1
        </button>
        <button onclick="appendValue('2')" class="bg-gray-700 p-3 rounded-lg">
          2
        </button>
        <button onclick="appendValue('3')" class="bg-gray-700 p-3 rounded-lg">
          3
        </button>

        <button
          onclick="appendValue('0')"
          class="bg-gray-700 p-3 rounded-lg col-span-2"
        >
          0
        </button>
        <button onclick="appendValue('.')" class="bg-gray-700 p-3 rounded-lg">
          .
        </button>
      </div>
    </div>

    <!-- JS -->
    <script src="./calculator.js"></script>
  </body>
</html>
